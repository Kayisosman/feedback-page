<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Feedback</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#f5f7fa;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.card{
background:white;
width:100%;
max-width:600px;
padding:40px;
border-radius:24px;
box-shadow:0 15px 40px rgba(0,0,0,0.08);
}

.logo{
width:90px;
height:90px;
border-radius:50%;
background:#e9eef5;
margin:auto;
margin-bottom:20px;
}

h1{
text-align:center;
font-size:32px;
margin-bottom:10px;
color:#111827;
}

.subtitle{
text-align:center;
color:#6b7280;
margin-bottom:35px;
}

.stars{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:30px;
}

.star{
font-size:42px;
cursor:pointer;
color:#d1d5db;
transition:0.2s;
}

.star:hover{
transform:scale(1.1);
}

textarea{
width:100%;
height:140px;
padding:15px;
border:1px solid #d1d5db;
border-radius:14px;
resize:none;
font-size:16px;
margin-bottom:20px;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:#111827;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

</style>
</head>

<body>

<div class="card">

<div class="logo"></div>

<h1 id="businessName">Vielen Dank!</h1>

<p class="subtitle">
Deine Meinung hilft uns, unseren Service zu verbessern.
</p>

<div class="stars">

<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>
<span class="star">★</span>

</div>

<textarea placeholder="Optionales Feedback"></textarea>

<button>Bewertung absenden</button>

</div>

</body>
</html>
